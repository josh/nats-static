apiVersion: v1
kind: Service
metadata:
  name: {{ include "nats-static.fullname" . }}
  labels:
    {{- include "nats-static.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "nats-static.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
