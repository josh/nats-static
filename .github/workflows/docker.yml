name: Docker

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: docker/github-builder/.github/workflows/build.yml@5f637c833aa76bc99372a1dc9a6f8bcd8056fb85 # v1.12.0
    with:
      output: local
      platforms: linux/amd64,linux/arm64
      cache: true
      cache-mode: max
